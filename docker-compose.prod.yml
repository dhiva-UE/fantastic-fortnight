services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - product_images_data:/data/product_images
      - purchase_invoices_data:/data/purchase_invoices
    environment:
      PRODUCT_IMAGES_DIR: /data/product_images
      PURCHASE_INVOICES_DIR: /data/purchase_invoices
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-inbound_inventory}
      POSTGRES_USER: ${DB_USER:-inventory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  product_images_data:
  purchase_invoices_data:
